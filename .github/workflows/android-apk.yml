name: Build Android APK

on:
  push:
    branches: [ main, master ] # Triggers the build whenever you push to main
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java Environment (Required for Android Gradle Build)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Node.js v22 (Fixes your Capacitor CLI version constraint error!)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 4. Install Frontend Dependencies
      - name: Install Dependencies
        run: npm install

      # 5. Build Web Project (Compiles your React/Tailwind frontend layout changes)
      - name: Build Web Application
        run: npm run build

      # 6. Sync Assets into the Native Android Project
      - name: Capacitor Sync
        run: npx cap sync android

      # 7. Grant Execute Permissions to the Gradle Wrapper
      - name: Change Gradle Wrapper Permissions
        run: chmod +x android/gradlew

      # 8. Compile the Debug APK using a globally installed Gradle instead of the broken local wrapper
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          cd android
          gradle assembleDebug # Notice we use 'gradle' instead of './gradlew'

      # 9. Upload the compiled APK so you can download and test it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7 # Kept for 7 days before auto-deleting
